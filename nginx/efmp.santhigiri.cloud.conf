# Nginx: santhigiri.cloud (landing) + sage.santhigiri.cloud (app) + efmp.santhigiri.cloud (app; legacy).
# This file includes all three; ensure only one copy is in sites-enabled (this or separate sage/efmp configs).
# App in Docker: frontend 3000, backend 3001 (published on host).
#
# Install:
#   sudo cp nginx/efmp.santhigiri.cloud.conf /etc/nginx/sites-available/efmp.santhigiri.cloud
#   sudo ln -sf /etc/nginx/sites-available/efmp.santhigiri.cloud /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# First-time SSL: run scripts/setup-ssl-santhigiri.sh (or certbot --webroot -w /var/www/certbot -d efmp.santhigiri.cloud)

# -----------------------------------------------------------------------------
# santhigiri.cloud (root domain) → static landing page
# Ensure landing files exist: sudo cp -r /home/efmp/eFMP/landing/* /var/www/santhigiri.cloud/
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name santhigiri.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    root /var/www/santhigiri.cloud;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# -----------------------------------------------------------------------------
# santhigiri.cloud HTTPS (landing page)
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name santhigiri.cloud;

    ssl_certificate     /etc/letsencrypt/live/santhigiri.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/santhigiri.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/santhigiri.cloud;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# -----------------------------------------------------------------------------
# sage.santhigiri.cloud → app (HTTP 80) — primary app domain
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name sage.santhigiri.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        set $redirect_https 1;
        if ($http_x_forwarded_proto = "https") { set $redirect_https 0; }
        if ($redirect_https = 1) { return 301 https://$host$request_uri; }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        client_max_body_size 50M;
        set $redirect_https 1;
        if ($http_x_forwarded_proto = "https") { set $redirect_https 0; }
        if ($redirect_https = 1) { return 301 https://$host$request_uri; }

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 300s;
    }

    location /socket.io/ {
        set $redirect_https 1;
        if ($http_x_forwarded_proto = "https") { set $redirect_https 0; }
        if ($redirect_https = 1) { return 301 https://$host$request_uri; }

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# -----------------------------------------------------------------------------
# sage.santhigiri.cloud → app (HTTPS 443)
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name sage.santhigiri.cloud;

    ssl_certificate     /etc/letsencrypt/live/sage.santhigiri.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sage.santhigiri.cloud/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        client_max_body_size 50M;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# -----------------------------------------------------------------------------
# efmp.santhigiri.cloud → app (HTTP 80) — legacy
# - Certbot: /.well-known/acme-challenge/
# - If request came as HTTPS via proxy (X-Forwarded-Proto: https): proxy to app (no redirect, avoid loop)
# - Else: redirect to HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name efmp.santhigiri.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        set $redirect_https 1;
        if ($http_x_forwarded_proto = "https") { set $redirect_https 0; }
        if ($redirect_https = 1) { return 301 https://$host$request_uri; }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        client_max_body_size 50M;
        set $redirect_https 1;
        if ($http_x_forwarded_proto = "https") { set $redirect_https 0; }
        if ($redirect_https = 1) { return 301 https://$host$request_uri; }

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 300s;
    }

    location /socket.io/ {
        set $redirect_https 1;
        if ($http_x_forwarded_proto = "https") { set $redirect_https 0; }
        if ($redirect_https = 1) { return 301 https://$host$request_uri; }

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

