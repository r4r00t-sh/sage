# Nginx: santhigiri.cloud → static landing page (HTML in landing/)
# SAGE/EFMP app is at sage.santhigiri.cloud.
#
# Install:
#   sudo cp nginx/santhigiri.cloud.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/santhigiri.cloud.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Root path: set to your project landing folder or copy landing/ to /var/www/santhigiri.cloud
# Example: root /home/efmp/eFMP/landing;   or   root /var/www/santhigiri.cloud;

server {
    listen 80;
    server_name santhigiri.cloud;

    root /home/efmp/eFMP/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
