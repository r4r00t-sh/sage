<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santhigiri</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1.125rem;
      color: #94a3b8;
      max-width: 28rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <h1>Santhigiri</h1>
  <p>Welcome. Use the E-Filing Management Platform to manage files, dispatch, and workflows.</p>
  <a href="https://efmp.santhigiri.cloud">Go to EFMP →</a>
</body>
</html>
