# Cloudflare Authenticated Origin Pulls – include this in your 443 server block.
# 1. Download Cloudflare CA: sudo curl -o /etc/ssl/cloudflare/cloudflare-origin-pull-ca.pem \
#      https://developers.cloudflare.com/ssl/static/authenticated_origin_pull_ca.pem
# 2. Copy this file: sudo cp nginx-snippets/cloudflare-origin-pull.conf /etc/nginx/snippets/
# 3. In your server block: include /etc/nginx/snippets/cloudflare-origin-pull.conf;
# 4. Enable "Authenticated Origin Pulls" in Cloudflare Dashboard (SSL/TLS → Origin Server).

ssl_client_certificate /etc/ssl/cloudflare/cloudflare-origin-pull-ca.pem;
ssl_verify_client on;
